# seed_tickers.yaml
#
# Master list of US-listed LatAm ADRs that NB1 v2's puller attempts to fetch.
# Single source of truth for "what's in the universe pipeline."
#
# Loading:
#   import yaml
#   data     = yaml.safe_load(open("data/static/seed_tickers.yaml"))
#   active   = data["active"]      # list[str], passed to puller
#   excluded = data["excluded"]    # dict[str, str], ticker -> reason
#
# To add a ticker: append to `active` (alphabetical within country section).
# To disqualify a ticker that the vendor mis-resolves or is otherwise
# unusable: move it to `excluded` with a reason. Do NOT delete entries —
# the audit trail matters for paper reproducibility.
#
# Counts: 78 active + 3 excluded = 81 total

